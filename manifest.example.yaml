describe: |
  2 nm CuOx / 50 nm Cu / 3 nm Ti on Si in D2O (SLD ~6).
  Neutrons enter from the silicon side.

# Optional: emit a DATA_DIR = "<data_dir>" line at the top of the
# generated model script. File paths listed below are rewritten as
# os.path.join(DATA_DIR, <relative path>) in the script, so anyone can
# share the .py file and only edit DATA_DIR to point at their local
# data copy. Relative values resolve against this manifest's directory
# at generation time.
data_dir: data

states:
  # One state per physical sample condition. Within a state ALL data
  # files see exactly the same Sample object, so every structural
  # parameter (layer thickness, SLD, roughness, substrate interface, …)
  # is automatically tied across that state's files — there is no knob
  # to untie them.
  #
  # ACROSS states, tying is controlled by `shared_parameters` (whitelist)
  # or `unshared_parameters` (blacklist — mutually exclusive).

  - name: run_226642                 # partials: 3 segments, one sample
    data:
      - data/REFL_226642_1_226642_partial.txt
      - data/REFL_226642_2_226643_partial.txt
      - data/REFL_226642_3_226644_partial.txt
    theta_offset:      {init: 0.0, min: -0.02, max: 0.02}
    sample_broadening: {init: 0.0, min:  0.0,  max: 0.01}   # or `true` for defaults

  - name: run_226652                 # one combined file → one experiment
    data:
      - data/REFL_226652_combined_data_auto.txt
    back_reflection: true            # flip probe geometry per state

model_name: Cu-D2O-corefine-226642-226652-parts