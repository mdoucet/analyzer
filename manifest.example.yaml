# --------------------------------------------------------------
# Batch manifest
# Each entry under "jobs" is one analysis run.
# Copy this file, edit the values, then run:
#
#   analyzer-batch manifest.yaml
#   analyzer-batch manifest.yaml --dry-run
#   analyzer-batch manifest.yaml --jobs copper_offset,gold_offset
#
# All paths are relative to the manifest file's directory unless
# they are absolute.
#
# Every job must have:
#   name  - unique label (used for logging and --jobs filter)
#   tool  - one of the CLI entry points (run-fit, assess-partial,
#           assess-result, theta-offset, eis-intervals, etc.)
#   args  - list of positional and --flag arguments, exactly as you
#           would type them on the command line
#
# The optional top-level "defaults" section supplies fallback
# key/values that are merged into every job (jobs can override).
# --------------------------------------------------------------

# -- Shared defaults (applied to every job unless overridden) --
defaults:
  output_root: ./output       # each job writes to <output_root>/<job name>

# -- Jobs ------------------------------------------------------
jobs:
  # -- Theta-offset calculations -------------------------------
  - name: copper_offset
    tool: theta-offset
    args:
      - /SNS/REF_L/IPTS-33699/nexus/REF_L_226642.nxs.h5
      - --db
      - /SNS/REF_L/shared/autoreduce/DB_226559.dat
      - --log
      - offsets.csv

  - name: gold_offset
    tool: theta-offset
    args:
      - /SNS/REF_L/IPTS-33699/nexus/REF_L_226700.nxs.h5
      - --db
      - /SNS/REF_L/shared/autoreduce/DB_226559.dat
      - --ymin
      - "135"
      - --ymax
      - "170"
      - --log
      - offsets.csv

  # -- Partial data quality checks -----------------------------
  - name: check_218281
    tool: assess-partial
    args:
      - "218281"

  - name: check_218386
    tool: assess-partial
    args:
      - "218386"

  # -- Fit + assess workflow -----------------------------------
  - name: fit_copper
    tool: run-fit
    args:
      - "218281"
      - cu_thf

  - name: assess_copper
    tool: assess-result
    args:
      - results/218281_cu_thf
      - "218281"
      - cu_thf
